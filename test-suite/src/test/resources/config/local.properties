# Local Environment Configuration

# Environment
env=local
base.url=http://localhost:5173
api.base.url=http://localhost:8080

# Driver
driver.type=selenium
browser=chrome
headless=false
remote.enabled=false

# Healing
heal.enabled=false
heal.ai.enabled=false

# Parallel execution
parallel.enabled=false
parallel.thread.count=3
OPTIMIZELY_SDK_KEY=

# Database
db.enabled=false
db.jdbc.url=jdbc:mysql://localhost:3306/quince_test
db.username=root
db.password=

# Variant detection
detection.sdk.enabled=true
detection.cookie.enabled=true
detection.api.enabled=true
detection.dom.enabled=true
detection.heuristic.enabled=true
detection.fallback.variant=control

# Allure
allure.report.dir=target/allure-report
